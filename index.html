<div id="loading" style="text-align:center;">
    <h1>Loading...</h1>
    <p>Please wait while the page loads.</p>
</div>

<div id="continueBox" style="display:none; text-align:center;">
    <button onclick="triggerScare()">Continue</button>
</div>

<div id="theimg" style="display:none;">
    <img src="scare.jpg">
</div>

<audio id="audio" src="scream2.mp3"></audio>

<script>
window.onload = function() {
    setTimeout(function() {
        document.getElementById("loading").style.display = "none";
        document.getElementById("continueBox").style.display = "block";
    }, 3000);
};

function triggerScare() {
    document.getElementById("continueBox").style.display = "none";
    document.getElementById("theimg").style.display = "block";
    document.body.style.background = "black";

    document.getElementById("audio").play();

    if (document.documentElement.requestFullscreen) {
        document.documentElement.requestFullscreen();
    }
}
</script>
